services:
  postgres:
    image: postgres:17

    container_name: devsearch-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devsearch

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: devsearch-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  postgres_data: